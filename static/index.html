<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cadastro de Notas – Importação e Cálculo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        darkCard: '#1e1e1e',
                        darkBorder: '#2a2a2a',
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilos para o modo escuro - Foco em remover linhas claras */
        .dark input, .dark textarea, .dark select {
            background-color: #121212 !important;
            color: #e5e7eb !important;
            border: 1px solid #2a2a2a !important;
        }
        
        /* DESTAQUE SUTIL: Fundos escuros coloridos para CM, Atraso e Juros no modo noturno */
        /* CM - Azul bem escuro */
        .dark #notasTable td:nth-last-child(4),
        .dark #notasTable td:nth-last-child(4) input {
            background-color: #0a192f !important; /* Navy escuro */
            color: #93c5fd !important; /* Texto azul claro para contraste */
        }

        /* Atraso - Amarelo/Laranja bem escuro */
        .dark #notasTable td:nth-last-child(3),
        .dark #notasTable td:nth-last-child(3) input {
            background-color: #2d2006 !important; /* Marrom/Amarelo escuro */
            color: #fde047 !important; /* Texto amarelo claro */
        }

        /* Juros - Verde bem escuro */
        .dark #notasTable td:nth-last-child(2),
        .dark #notasTable td:nth-last-child(2) input {
            background-color: #062016 !important; /* Verde floresta escuro */
            color: #86efac !important; /* Texto verde claro */
        }

        /* Remove bordas de células da tabela que podem parecer linhas brancas */
        .dark td, .dark th, .dark table, .dark div.overflow-x-auto {
            border-color: #2a2a2a !important;
        }

        .dark input:focus, .dark textarea:focus {
            border-color: #dc2626 !important;
            box-shadow: 0 0 0 1px #dc2626 !important;
            outline: none !important;
        }

        /* Botão remover vermelho no modo escuro */
        .dark .btn-remover {
            background-color: #dc2626 !important;
            color: white !important;
            border: none !important;
            padding: 4px 12px !important;
            border-radius: 6px !important;
            font-weight: 600 !important;
            font-size: 0.75rem !important;
        }
        .dark .btn-remover:hover {
            background-color: #b91c1c !important;
        }

        /* Scrollbar escura */
        .dark ::-webkit-scrollbar { width: 8px; height: 8px; }
        .dark ::-webkit-scrollbar-track { background: #121212; }
        .dark ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>

<body class="bg-slate-50 min-h-screen p-6 dark:bg-[#121212] dark:text-gray-300">
    <div class="max-w-full mx-auto space-y-6">
        
        <!-- Botão de Modo Noturno -->
        <div class="flex justify-end">
            <button id="darkModeBtn" onclick="toggleDarkMode()" class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-[#1e1e1e] text-gray-700 dark:text-gray-300 rounded-lg shadow-sm border border-gray-200 dark:border-[#2a2a2a] hover:bg-gray-50 dark:hover:bg-[#252525]">
                <span id="themeIcon">🌙</span>
                <span id="themeText">Modo Escuro</span>
            </button>
        </div>

        <!-- TOP: import + tabela de notas -->
        <div class="bg-white dark:bg-[#1e1e1e] rounded-xl shadow p-6 border border-transparent dark:border-[#2a2a2a]">
            <h1 class="text-2xl font-semibold mb-4 text-gray-800 dark:text-white">Importar / Cadastro de Notas</h1>

            <!-- Campos globais -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4 p-4 bg-slate-50 dark:bg-[#181818] rounded-lg">
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-600 dark:text-gray-400">Inscrição Estadual</label>
                    <input type="text" id="inscricaoEstadual" placeholder="Ex.: 123456789"
                        class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 dark:focus:ring-0 outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-600 dark:text-gray-400">Nome da Guia</label>
                    <input type="text" id="nomeGuia" placeholder="Ex.: EMPRESA XYZ"
                        class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 dark:focus:ring-0 outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-600 dark:text-gray-400">Caminho de Destino</label>
                    <input type="text" id="caminhoDestino" placeholder="Ex.: \\sv-scalco\Trabalho\Contabilidade"
                        class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 dark:focus:ring-0 outline-none" />
                </div>
            </div>

            <label class="block text-sm font-medium mb-2 text-gray-600 dark:text-gray-400">Cole os dados (Ctrl+V) – depois clique em <span
                    class="font-semibold text-blue-600 dark:text-red-500">Importar colado</span></label>
            <textarea id="pasteArea" rows="5"
                placeholder="Cole aqui as linhas..."
                class="w-full p-3 border rounded-lg mb-3 resize-y font-mono text-sm focus:ring-2 focus:ring-blue-500 dark:focus:ring-0 outline-none"></textarea>
            
            <div class="flex gap-2 mb-4">
                <button id="importPastedBtn"
                    class="px-4 py-2 bg-blue-600 dark:bg-red-600 text-white rounded shadow hover:bg-blue-700 dark:hover:bg-red-700">Importar
                    colado</button>
                <button id="clearImportedBtn" class="px-4 py-2 border rounded hover:bg-gray-50 dark:hover:bg-[#252525] dark:border-[#2a2a2a]">Limpar área</button>
            </div>

            <div class="overflow-x-auto border rounded max-h-[500px] overflow-y-auto dark:border-[#2a2a2a]">
                <table class="w-full text-sm min-w-max" id="notasTable">
                    <thead class="bg-slate-100 dark:bg-[#252525] sticky top-0">
                        <tr>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">Código</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">Chave de Acesso</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">NFE</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">DT EMISSÃO</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">ICMS a Recolher</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">Calcular com Atraso?</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">REFERÊNCIA</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">Data Pagamento</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">CM</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">Atraso</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">Juros</th>
                            <th class="p-3 border dark:border-[#2a2a2a] whitespace-nowrap">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="notasBody" class="divide-y divide-slate-200 dark:divide-[#2a2a2a]">
                    </tbody>
                </table>
            </div>

            <div class="mt-4 flex gap-2 flex-wrap">
                <button id="addRowBtn" class="px-4 py-2 border border-gray-300 dark:border-red-600 dark:text-red-500 rounded hover:bg-gray-50 dark:hover:bg-red-900/20">+ Adicionar linha</button>
                <button id="clearTableBtn" class="px-4 py-2 border rounded hover:bg-gray-50 dark:hover:bg-[#252525] dark:border-[#2a2a2a]">Limpar tabela</button>
                <button id="emitirGuiaBtn"
                    class="px-4 py-2 bg-green-600 dark:bg-red-600 text-white rounded hover:bg-green-700 dark:hover:bg-red-700 font-semibold">Emitir
                    Guia</button>
            </div>
        </div>

        <!-- BOTTOM: tabela de períodos -->
        <div class="bg-white dark:bg-[#1e1e1e] rounded-xl shadow p-6 border border-transparent dark:border-[#2a2a2a]">
            <h2 class="text-lg font-semibold mb-3 text-gray-800 dark:text-white">Índices por Período</h2>
            <div class="overflow-auto max-h-[60vh] border dark:border-[#2a2a2a] rounded-lg">
                <table class="w-full text-sm" id="periodosTable">
                    <thead class="bg-slate-100 dark:bg-[#252525]">
                        <tr>
                            <th class="p-3 border dark:border-[#2a2a2a]">Período (MM/AAAA)</th>
                            <th class="p-3 border dark:border-[#2a2a2a]">Último dia</th>
                            <th class="p-3 border dark:border-[#2a2a2a]">CM</th>
                            <th class="p-3 border dark:border-[#2a2a2a]">Juros (%/mês)</th>
                            <th class="p-3 border dark:border-[#2a2a2a]">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="periodosBody" class="divide-y divide-slate-200 dark:divide-[#2a2a2a]">
                    </tbody>
                </table>
            </div>
            <div class="mt-4">
                <button id="addPeriodoBtn" class="px-4 py-2 border border-gray-300 dark:border-red-600 dark:text-red-500 rounded hover:bg-gray-50 dark:hover:bg-red-900/20">+ Adicionar período</button>
            </div>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            
            html.classList.toggle('dark');
            
            if (html.classList.contains('dark')) {
                themeIcon.innerText = '☀️';
                themeText.innerText = 'Modo Claro';
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.innerText = '🌙';
                themeText.innerText = 'Modo Escuro';
                localStorage.setItem('theme', 'light');
            }
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('themeIcon').innerText = '☀️';
                document.getElementById('themeText').innerText = 'Modo Claro';
            }
        };
    </script>
    <script src="index.js"></script>
</body>

</html>
